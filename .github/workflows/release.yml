name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release OnDemand
    steps:
      - name: Set version
        id: version
        run: echo ::set-output name=version::${GITHUB_REF#refs/*/v}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Ruby using Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "2.5.23"
          bundler-cache: true
      - name: Generate tar.gz
        run: bundle exec rake package:tar
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OOD_PACKAGING_DEBUG: 'true'
      - name: Get release
        id: get_release
        uses: bruceadams/get-release@v1.2.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload Release files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/rpm/ondemand-${{ steps.version.outputs.version }}.tar.gz
      - name: Upload to Zenodo
        uses: rseng/zenodo-release@main
        with:
          token: ${{ secrets.OSC_ROBOT_ZENODO_TOKEN }}
          version: ${{ steps.version.outputs.version }}
          zenodo_json: .zenodo.json
          archive: packaging/rpm/ondemand-${{ steps.version.outputs.version }}.tar.gz
          doi: '10.5281/zenodo.6323791'
